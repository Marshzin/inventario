<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventário Democrata</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 420px;
      text-align: center;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #d6a354;
    }

    .subtitle {
      font-size: 16px;
      margin-bottom: 40px;
      color: #ccc;
    }

    .btn {
      width: 100%;
      padding: 18px;
      margin-bottom: 18px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      background: #d6a354;
      color: #111;
    }

    .btn.secondary {
      background: #fff;
      color: #111;
    }

    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="logo">DEMOCRATA</div>
    <div class="subtitle">Inventário - Novo Shopping</div>

    <button class="btn" onclick="window.location.href='inventario.html'">
      Fazer Inventário
    </button>

    <button class="btn secondary" onclick="window.location.href='consulta.html'">
      Consultar Inventário
    </button>
  </div>

</body>
</html>
